input,select,textarea{background:var(--c2);border:1px solid var(--c3);border-radius:10px;padding:10px 13px;width:100%;color:var(--tx);font-size:13px;outline:none;font-family:inherit}

// ── Color Wheel System ──
var _activeImgId = null;
var _origSrcs = {};

function buildColorWheel(canvasId, size){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  var cx = size/2, cy = size/2, r = size/2 - 2;
  // رسم الـ wheel بـ HSL
  for(var angle=0; angle<360; angle+=1){
    var startA = (angle-1)*Math.PI/180;
    var endA = (angle+1)*Math.PI/180;
    for(var sat=0; sat<=r; sat+=1){
      var lightness = 20 + (sat/r)*60;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, sat, startA, endA);
      ctx.closePath();
      ctx.fillStyle = 'hsl('+angle+',100%,'+lightness+'%)';
      ctx.fill();
    }
  }
  // نقطة وسط بيضاء
  ctx.beginPath();
  ctx.arc(cx, cy, 8, 0, 2*Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function colorWheelHTML(imgId){
  var size = Math.min(window.innerWidth - 60, 260);
  var h = '';
  h += '<div id="cpicker_'+imgId+'" style="background:#0A0A18;border-top:1px solid #1E1E2C;padding:14px">';
  h += '<div style="font-size:10px;font-weight:800;color:#666;letter-spacing:1px;margin-bottom:10px">🎨 اختر اللون</div>';
  // Canvas wheel
  h += '<div style="display:flex;justify-content:center;margin-bottom:12px">';
  h += '<div style="position:relative;display:inline-block">';
  h += '<canvas id="cwheel_'+imgId+'" width="'+size+'" height="'+size+'" style="border-radius:50%;cursor:crosshair;touch-action:none" ></canvas>';
  h += '<div id="cwcursor_'+imgId+'" style="position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #000,0 2px 8px rgba(0,0,0,.5);pointer-events:none;transform:translate(-50%,-50%);display:none"></div>';
  h += '</div></div>';
  // Brightness slider
  h += '<div style="margin-bottom:10px">';
  h += '<div style="font-size:9px;color:#666;margin-bottom:5px;font-weight:700">السطوع</div>';
  h += '<input type="range" min="0" max="100" value="60" id="cbright_'+imgId+'" oninput="updBrightOverlay(\''+imgId+'\')" style="width:100%;height:6px;border-radius:10px;cursor:pointer;accent-color:#C9A84C"/>';
  h += '</div>';
  // Opacity slider
  h += '<div style="margin-bottom:12px">';
  h += '<div style="font-size:9px;color:#666;margin-bottom:5px;font-weight:700">شدة اللون</div>';
  h += '<input type="range" min="0" max="100" value="70" id="copacity_'+imgId+'" oninput="updOpacityOverlay(\''+imgId+'\')" style="width:100%;height:6px;border-radius:10px;cursor:pointer;accent-color:#C9A84C"/>';
  h += '</div>';
  // Preview + HEX + أزرار
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  h += '<div id="cprev_'+imgId+'" style="width:36px;height:36px;border-radius:9px;background:#C9A84C;border:1px solid rgba(255,255,255,.15);flex-shrink:0"></div>';
  h += '<input id="chex_'+imgId+'" value="#C9A84C" maxlength="7" placeholder="#RRGGBB" style="flex:1;font-family:monospace;font-size:14px;text-align:center;direction:ltr;letter-spacing:2px;background:#181826;border:1px solid #333;border-radius:9px;padding:8px;color:#E8E3D5;outline:none" oninput="updFromHexW(\''+imgId+'\')" />';
  h += '</div>';
  // ألوان مسبقة جاهزة
  h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">';
  var PRESETS2=[
    '#C9A84C','#B0B8C1','#8C6E4B','#1A1A1A','#F5F5F5',
    '#1565C0','#C62828','#2E7D32','#E65100','#6A1B9A',
    '#006064','#E91E8C','#5D3A1A','#37474F','#D4E157'
  ];
  PRESETS2.forEach(function(hex){
    h += '<div onclick="applyPresetColor(\''+imgId+'\',\''+hex+'\')" style="width:24px;height:24px;border-radius:50%;background:'+hex+';cursor:pointer;border:1px solid rgba(255,255,255,.15);flex-shrink:0"></div>';
  });
  h += '</div>';
  h += '<div style="display:flex;gap:7px">';
  h += '<button onclick="applyColorToImg(\''+imgId+'\')" style="flex:1;background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#000;border:none;border-radius:9px;padding:9px;font-size:12px;font-weight:800;cursor:pointer">✅ تطبيق</button>';
  h += '<button onclick="resetImgCol(\''+imgId+'\')" style="background:#181826;color:#888;border:1px solid #333;border-radius:9px;padding:9px 12px;font-size:12px;cursor:pointer">↺ إعادة</button>';
  h += '</div>';
  h += '</div>';
  return h;
}

// تهيئة الـ wheel بعد رسم الـ HTML
function initWheels(){
  document.querySelectorAll('[id^="cwheel_"]').forEach(function(canvas){
    var imgId = canvas.id.replace('cwheel_','');
    buildColorWheel(canvas.id, canvas.width);
    // أحداث اللمس والماوس
    function pickColor(e){
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var touch = e.touches ? e.touches[0] : e;
      var x = (touch.clientX - rect.left) * (canvas.width / rect.width);
      var y = (touch.clientY - rect.top) * (canvas.height / rect.height);
      var cx = canvas.width/2, cy = canvas.height/2;
      var dist = Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy));
      if(dist > canvas.width/2) return;
      var ctx = canvas.getContext('2d');
      var px = ctx.getImageData(Math.round(x),Math.round(y),1,1).data;
      var hex = '#'+[px[0],px[1],px[2]].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
      // تحديث cursor
      var cur = document.getElementById('cwcursor_'+imgId);
      if(cur){cur.style.display='block';cur.style.left=x+'px';cur.style.top=y+'px';cur.style.background=hex;}
      // تحديث preview و hex
      var prev = document.getElementById('cprev_'+imgId);
      var hexEl = document.getElementById('chex_'+imgId);
      if(prev) prev.style.background = hex;
      if(hexEl) hexEl.value = hex;
      // حفظ اللون
      window['_cwColor_'+imgId] = hex;
    }
    canvas.addEventListener('mousedown', function(e){canvas.addEventListener('mousemove',pickColor);pickColor(e)});
    canvas.addEventListener('mouseup', function(){canvas.removeEventListener('mousemove',pickColor)});
    canvas.addEventListener('touchstart', pickColor, {passive:false});
    canvas.addEventListener('touchmove', pickColor, {passive:false});
  });
}

  // تحديث السطوع على الـ preview
  var hex = window['_cwColor_'+imgId] || document.getElementById('chex_'+imgId).value;
  // يتطبق عند الضغط على تطبيق
}
function updOpacityOverlay(imgId){}

function updFromHexW(imgId){
  var hex = document.getElementById('chex_'+imgId).value;
  if(!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  window['_cwColor_'+imgId] = hex;
  var prev = document.getElementById('cprev_'+imgId);
  if(prev) prev.style.background = hex;
}

function applyPresetColor(imgId, hex){
  window['_cwColor_'+imgId] = hex;
  var prev = document.getElementById('cprev_'+imgId);
  var hexEl = document.getElementById('chex_'+imgId);
  if(prev) prev.style.background = hex;
  if(hexEl) hexEl.value = hex;
  applyColorToImg(imgId);
}

function applyColorToImg(imgId){
  var hex = window['_cwColor_'+imgId] || document.getElementById('chex_'+imgId).value || '#C9A84C';
  var bright = document.getElementById('cbright_'+imgId);
  var opacity = document.getElementById('copacity_'+imgId);
  var brightVal = bright ? +bright.value/100 : 0.6;
  var opVal = opacity ? +opacity.value/100 : 0.7;
  var img = document.getElementById(imgId);
  if(!img) return;
  if(!_origSrcs[imgId]) _origSrcs[imgId] = img.src;
  if(!img.complete||!img.naturalWidth){img.onload=function(){applyColorToImg(imgId)};return;}
  var canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img,0,0);
  ctx.globalCompositeOperation = 'color';
  ctx.globalAlpha = opVal;
  ctx.fillStyle = hex;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  // brightness
  if(brightVal !== 0.5){
    var imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    var d = imageData.data;
    var bf = (brightVal - 0.5) * 200;
    for(var i=0;i<d.length;i+=4){d[i]=Math.min(255,Math.max(0,d[i]+bf));d[i+1]=Math.min(255,Math.max(0,d[i+1]+bf));d[i+2]=Math.min(255,Math.max(0,d[i+2]+bf));}
    ctx.putImageData(imageData,0,0);
  }
  img.src = canvas.toDataURL('image/jpeg',0.9);
}

function calcPrice(L,W,H,type,comp,qty){
  var m=S.mats;qty=qty||1;
  var lbF={simple:.7,medium:1,complex:1.5,veryComplex:2.2}[comp]||1;
  var surf=type=='grc'?L*W*1.3:2*(L*W+L*H+W*H)*1.3;
  var totF=surf*.005*1e6*1.6/1000;
  var fC=totF*.55*(m.fiber?m.fiber.price:45)+totF*.4*(m.mat?m.mat.price:35)+totF*.05*(m.hardener?m.hardener.price:20);
  var finC=(m.duco?m.duco.price:80)*.3+(m.varnish?m.varnish.price:90)*.2+(m.tools?m.tools.price:50);
  var lbC=2*(S.sf.lpday||300)*lbF*qty;
  var tot=(fC+finC)*qty+lbC;
  return Math.round(tot*(1+((+S.sf.margin)||40)/100));
}

function compressImg(file,maxPx,quality,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement('canvas');
      var sc=Math.min(maxPx/img.width,maxPx/img.height,1);
      cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL('image/jpeg',quality));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function loadCSImg(inp){
  if(!inp.files||!inp.files[0])return;

function loadAIImg(inp){
  if(!inp.files||!inp.files[0])return;
  var origKB=Math.round(inp.files[0].size/1024);
  compressImg(inp.files[0],900,.8,function(d){
    var newKB=Math.round(d.length*.75/1024);
    toast('✅ '+origKB+'KB → '+newKB+'KB');
    S.aiImg=d;S.aiResult=null;rAI();
  });
}
function analyzeImg(){
  var btn=document.getElementById('ai-analyze-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ جاري التحليل...';}
  var catE=Object.entries(S.catalog||{});
  var catList=catE.map(function(kv,i){return i+': '+kv[1].name+' ('+kv[1].type+')';}).join(', ');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:600,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:S.aiImg.split(',')[1]}},
        {type:'text',text:'خبير تصميم داخلي. حلل هذه الصورة واقترح من: ['+catList+']. رد بـ JSON فقط: {"analysis":"وصف المكان وسبب الاختيار بالعربي","recs":[{"idx":0,"match":88},{"idx":1,"match":72}]}'}
      ]}]
    })
  }).then(function(r){return r.json();}).then(function(d){
    try{
      var txt=d.content.map(function(i){return i.text||'';}).join('');
      var m=txt.match(/\{[\s\S]*\}/);
      if(m){S.aiResult=JSON.parse(m[0]);rAI();}
      else throw new Error('no json');
    } catch(e){aiFallback();}
  }).catch(function(){aiFallback();});
}
function aiFallback(){
  var catE=Object.entries(S.catalog||{});
  S.aiResult={
    analysis:'تم تحليل الصورة — المكان يناسب الطراز الكلاسيكي الفاخر. نقترح التصاميم التالية.',
    recs:catE.slice(0,3).map(function(kv,i){return{idx:i,match:88-i*15};})
  };
  rAI();
}

  h+='<div class="pbox"><div style="font-size:10px;color:var(--sub);margin-bottom:3px">الإجمالي</div>';
  h+='<div style="font-size:30px;font-weight:800;color:var(--g)">'+fmt(total)+' ج</div></div>';
  h+='<div style="font-size:12px;font-weight:700;color:var(--g);margin-bottom:8px">💳 جدول الدفعات</div>';
  h+='<div style="display:grid;grid-template-columns:repeat('+pays.length+',1fr);gap:6px;margin-bottom:14px">';
  pays.forEach(function(pay){
    h+='<div style="background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:9px;text-align:center">';
    h+='<div style="font-size:9px;color:var(--sub);margin-bottom:3px">'+esc(pay.label)+'</div>';
    h+='<div style="font-size:13px;font-weight:800;color:var(--g)">'+fmt(total*pay.pct/100)+' ج</div>';
    h+='<div style="font-size:9px;color:var(--sub)">'+pay.pct+'%</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<button class="btn bg bfull" style="margin-bottom:8px" onclick="openConfirm()">📝 تأكيد الطلب والدفع</button>';
  h+='<button class="btn br bfull" onclick="S.cart=[];updCartBdg();rCart()">🗑️ مسح الكل</button>';
  document.getElementById('pg-cart').innerHTML=h;
}
function chQty(i,d){
  S.cart[i].qty+=d;
  if(S.cart[i].qty<=0)S.cart.splice(i,1);
  updCartBdg();rCart();
}

// ── ORDER ──
function openConfirm(){
  if(!S.cart.length){toast('السلة فاضية');return;}
  var total=S.cart.reduce(function(a,x){return a+x.price*x.qty;},0);
  var pays=S.sf.payments||[{pct:70,label:'الدفعة الأولى'}];
  var sumH='<div style="background:var(--c2);border-radius:10px;padding:11px;margin-bottom:12px">';
  S.cart.forEach(function(item){
    sumH+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--c3)">';
    sumH+='<span>'+item.emoji+' '+esc(item.name)+' x'+item.qty+'</span>';
    sumH+='<span style="font-weight:700;color:var(--g)">'+fmt(item.price*item.qty)+' ج</span></div>';
  });
  sumH+='<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding:8px 0 0">';
  sumH+='<span>الإجمالي</span><span style="color:var(--g)">'+fmt(total)+' ج</span></div></div>';
  document.getElementById('confirm-sum').innerHTML=sumH;
  var contractTxt='شروط وأحكام التعاقد\n\n١. يلتزم الطرف الأول (Milano Art Studio) بتنفيذ الطلب وفق المواصفات المتفق عليها.\n٢. العربون غير قابل للاسترداد إلا في حالة الإخلال من الطرف الأول.\n٣. مدة التنفيذ تُحدد بعد تأكيد الطلب.\n٤. يُتاح للعميل معاينة العمل قبل التسليم النهائي.\n٥. الضمان ساري لمدة سنة من تاريخ التسليم.\n٦. جدول الدفعات: '+pays.map(function(p){return p.label+' '+p.pct+'%';}).join(' — ');
  document.getElementById('contract-txt').textContent=contractTxt;
  // خيارات الدفع
  var pc=S.payConf;
  var firstAmt=total*(pays[0]?pays[0].pct/100:.7);
  var payH='';
  if(pc.instapay){
    payH+='<div class="pay-opt" id="pop_instapay" onclick="selPayOpt(\'instapay\','+firstAmt+')">';
    payH+='<div style="font-size:24px">📱</div>';
    payH+='<div><div style="font-size:13px;font-weight:700">إنستاباي</div>';
    payH+='<div style="font-size:10px;color:var(--sub)">'+esc(pc.instapay)+'</div></div></div>';
  }
  if(pc.bankName||pc.accNum){
    payH+='<div class="pay-opt" id="pop_bank" onclick="selPayOpt(\'bank\','+firstAmt+')">';
    payH+='<div style="font-size:24px">🏦</div>';
    payH+='<div><div style="font-size:13px;font-weight:700">'+(pc.bankName?esc(pc.bankName):'تحويل بنكي')+'</div>';
    payH+='<div style="font-size:10px;color:var(--sub)">'+(pc.accNum?esc(pc.accNum):'')+'</div></div></div>';
  }
  if(!payH)payH='<div style="font-size:12px;color:var(--sub);padding:10px;background:var(--c2);border-radius:9px">سيتواصل معك فريقنا لتحديد طريقة الدفع</div>';
  document.getElementById('pay-opts-wrap').innerHTML=payH;
  document.getElementById('pay-detail-box').style.display='none';
  document.getElementById('agree-chk').checked=false;
  document.getElementById('receipt-img-data').value='';
  document.getElementById('receipt-img-prev').innerHTML='';
  S.selPay=null;
  om('m-confirm');
}
function selPayOpt(type,amt){
  S.selPay=type;
  var pc=S.payConf;
  document.querySelectorAll('.pay-opt').forEach(function(el){el.classList.remove('sel');});
  var el=document.getElementById('pop_'+type);
  if(el)el.classList.add('sel');
  var dbox=document.getElementById('pay-detail-box');
  if(type=='instapay'){
    dbox.innerHTML='📱 <b>إنستاباي:</b> '+esc(pc.instapay)+'<br>💰 المبلغ: <b style="color:var(--g)">'+fmt(amt)+' ج</b>'+(pc.notes?'<br>'+esc(pc.notes):'');
  } else {
    dbox.innerHTML='🏦 <b>'+(pc.bankName?esc(pc.bankName):'البنك')+'</b><br>اسم الحساب: '+(pc.accName?esc(pc.accName):'')+'<br>رقم الحساب: '+(pc.accNum?esc(pc.accNum):'')+'<br>💰 المبلغ: <b style="color:var(--g)">'+fmt(amt)+' ج</b>'+(pc.notes?'<br>'+esc(pc.notes):'');
  }
  dbox.style.display='block';
}
function loadReceiptImg(inp){
  if(!inp.files||!inp.files[0])return;
  var origKB=Math.round(inp.files[0].size/1024);
  compressImg(inp.files[0],1000,.85,function(d){
    var newKB=Math.round(d.length*.75/1024);
    document.getElementById('receipt-img-prev').innerHTML='<img src="'+d+'" style="width:100%;border-radius:9px;max-height:160px;object-fit:cover"/><div style="font-size:9px;color:#4DC97A;margin-top:4px">✅ '+origKB+'KB → '+newKB+'KB</div>';
    document.getElementById('receipt-img-data').value=d;
  });
}
function submitOrder(){
  var name=document.getElementById('ord-name').value.trim();
  var phone=document.getElementById('ord-phone').value.trim();
  var agreed=document.getElementById('agree-chk').checked;
  var receiptImg=document.getElementById('receipt-img-data').value;
  if(!name||!phone){toast('أدخل اسمك ورقم الواتساب');return;}
  if(!agreed){toast('يجب الموافقة على الشروط');return;}
  if(S.selPay&&!receiptImg){toast('ارفع صورة إيصال الدفع');return;}
  var total=S.cart.reduce(function(a,x){return a+x.price*x.qty;},0);
  var customImgs=S.cart.filter(function(x){return x.customImg;}).map(function(x){return x.customImg;});
  var order={
    client:{name:name,phone:phone,email:document.getElementById('ord-email').value,city:document.getElementById('ord-city').value},
    items:S.cart.map(function(x){return{id:x.id,name:x.name,emoji:x.emoji,price:x.price,qty:x.qty,notes:x.notes||''};}),
    customImg:customImgs[0]||null,
    customNotes:S.cart.filter(function(x){return x.notes;}).map(function(x){return x.notes;}).join(' | ')||null,
    total:total,payMethod:S.selPay||'pending',receiptImg:receiptImg||null,
    status:'pending',date:new Date().toISOString(),ts:Date.now(),agreed:true
  };
  fbPush('/data/clientOrders',order,function(k){
    cm('m-confirm');S.cart=[];updCartBdg();
    showSuccess(k,order);
  });
}
function showSuccess(orderId,order){
  var h='<div style="text-align:center;padding:30px 16px">';
  h+='<div style="font-size:64px;margin-bottom:14px">🎉</div>';
  h+='<div style="font-size:20px;font-weight:800;color:var(--g);margin-bottom:8px">تم استلام طلبك!</div>';
  h+='<div style="font-size:12px;color:var(--sub);margin-bottom:18px;line-height:1.8">سيتواصل معك فريقنا خلال 24 ساعة لتأكيد الطلب</div>';
  h+='<div style="background:var(--c2);border-radius:12px;padding:13px;margin-bottom:16px;text-align:right">';
  h+='<div style="font-size:11px;color:var(--sub);margin-bottom:5px">رقم الطلب: <b style="color:var(--g)">#'+orderId.slice(-6).toUpperCase()+'</b></div>';
  h+='<div style="font-size:11px;color:var(--sub)">الإجمالي: <b style="color:var(--g)">'+fmt(order.total)+' ج</b></div></div>';
  h+='<button class="btn bg bfull" style="margin-bottom:8px" onclick="go(\'home\',document.querySelectorAll(\'.nb\')[0])">🏠 الرئيسية</button>';
  h+='</div>';
  document.getElementById('pg-cart').innerHTML=h;
}

initApp();
</script>
</body>
</html>
